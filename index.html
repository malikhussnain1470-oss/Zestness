<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zestness Store</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
    }

    header {
      background: black;
      color: white;
      padding: 18px;
      text-align: center;
      font-size: 24px;
      letter-spacing: 1px;
    }

    .brand {
      color: #d6cfc7; /* pastel touch */
      font-size: 14px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .product {
      background: white;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
      text-align: center;
      transition: 0.2s;
    }

    .product:hover {
      transform: translateY(-5px);
    }

    .product img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
    }

    .price {
      color: #444;
      font-weight: bold;
      margin: 6px 0;
    }

    button {
      background: black;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #333;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: black;
      color: #ccc;
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  ZESTNESS 🖤
  <div class="brand">Premium Style Store</div>
</header>

<div class="container">

  <div class="product">
    <img src="https://via.placeholder.com/300" />
    <h3>T-Shirt</h3>
    <p class="price">Rs 999</p>
    <button onclick="buy('T-Shirt')">Buy Now</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/300" />
    <h3>Watch</h3>
    <p class="price">Rs 2500</p>
    <button onclick="buy('Watch')">Buy Now</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/300" />
    <h3>Shoes</h3>
    <p class="price">Rs 3500</p>
    <button onclick="buy('Shoes')">Buy Now</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/300" />
    <h3>Cap</h3>
    <p class="price">Rs 799</p>
    <button onclick="buy('Cap')">Buy Now</button>
  </div>

</div>

<footer>
  © 2026 Zestness | WhatsApp: 03134821812
</footer>

<script>
  function buy(product) {
    let phone = "923134821812"; 
    let message = "Hello Zestness, I want to order " + product;
    let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
    window.open(url, "_blank");
  }
</script>

</body>
</html>
